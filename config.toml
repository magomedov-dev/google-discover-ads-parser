# Конфигурация парсера рекламы Google Discover.
# Все значения опциональны — отсутствующие берутся по умолчанию.
# Флаги CLI переопределяют значения из этого файла.

[scrape]
# Сколько свайпов (итераций) делать за одну обработку ленты.
swipes = 25
# Каталог для собранной рекламы (подкаталог на устройство).
output_dir = "ads"
# Допуск выравнивания низа рекламы, px.
align_tolerance = 20
# Ожидание появления элементов (медленный старт / плохой интернет), с.
ready_timeout = 15.0
# Ожидание загрузки сайта/диалогов рекламы, с.
ad_load_timeout = 3.0
# «Просмотр» сайта рекламы перед закрытием — случайно в диапазоне [min, max], с.
ad_dwell_min = 2.0
ad_dwell_max = 5.0
# Сколько раз жмём back, возвращаясь в ленту, прежде чем сдаться.
back_attempts = 5
# Сколько свайпов делать после рекламы, чтобы не найти её снова.
post_ad_swipes = 2
# Минимальная высота медиа-области, px.
min_media_height = 80
# Базовая пауза «дать UI/ленте успокоиться», с.
settle = 0.5
# Максимум ожидания, пока лента догрузится и остановится, с.
settle_timeout = 8.0
# Сколько одинаковых дампов подряд считаем «лента успокоилась».
settle_stable = 2
# Попыток запустить приложение, прежде чем сдаться.
launch_attempts = 3

[fleet]
# Лимит одновременно обрабатываемых устройств.
concurrency = 8
# Серийники устройств. Пусто — автоопределение через `adb devices`.
devices = []
